name: C/C++ CMake CI

on: [push, pull_request]

env:
  # Conan cache environment variables
  CONAN_SYSREQUIRES_MODE: enabled
  CONAN_USER_HOME: "${{ github.workspace }}/conan-cache"
  CONAN_USER_HOME_SHORT: "${{ github.workspace }}/conan-cache/short"

jobs:
  docker:
    name: Test docker images
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Build docker-ci image
        shell: bash
        run: cd docker && ./build-ci-image.sh

      - name: Build docker-dev image
        shell: bash
        run: cd docker && ./build-dev-image.sh

  linux:
    name: ${{ matrix.os }}, ${{ matrix.compiler.name }}, ${{ matrix.buildtype }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false  # 'false' means Don't stop matrix workflows even if some matrix entry fails.
      matrix:
        os: [ubuntu-24.04]
        buildtype: [debug, release]
        compiler: [ {name: 'GCC 10', preset: gcc-10, pkgs: 'gcc-10 g++-10 lib32gcc-10-dev gcc-multilib'},
                    {name: 'GCC 11', preset: gcc-11, pkgs: 'gcc-11 g++-11 lib32gcc-11-dev gcc-multilib'},
                    {name: 'GCC 12', preset: gcc-12, pkgs: 'gcc-12 g++-12 lib32gcc-12-dev gcc-multilib'},
                    {name: 'GCC 13', preset: gcc-13, pkgs: 'gcc-13 g++-13 lib32gcc-13-dev gcc-multilib'},
                    {name: 'GCC 14', preset: gcc-14, pkgs: 'gcc-14 g++-14 lib32gcc-14-dev gcc-multilib'},
                    {name: 'Clang 17', preset: clang-17, version: '17'},
                    {name: 'Clang 18', preset: clang-18, version: '18'},
                    {name: 'Clang 19', preset: clang-19, version: '19'},
                    {name: 'Clang 20', preset: clang-20, version: '20'}
                  ]
    steps:
    - uses: actions/checkout@v4

    - name: Cache
      uses: actions/cache@v4
      env:
        cache-name: cache-conan-modules
      with:
        path: |
          ${{ env.CONAN_USER_HOME }}
          ~/.cache/pip
        key: ${{ runner.os }}-${{ env.BUILD_TYPE }}-${{ hashFiles('CMakeLists.txt') }}-${{ hashFiles('cmake/Conan.cmake') }}

    - name: Install LLVM dependencies
      if: ${{ startsWith(matrix.compiler.name, 'Clang') }}
      run:   |
             sudo apt update
             sudo apt install ninja-build ccache
             sudo apt-get purge --auto-remove llvm python3-lldb-14 llvm-14 # https://github.com/llvm/llvm-project/issues/64182
             wget https://apt.llvm.org/llvm.sh
             sudo chmod -x llvm.sh
             sudo bash llvm.sh ${{ matrix.compiler.version }}
      shell: bash

    - name: Install dependencies
      if: ${{ startsWith(matrix.compiler.name, 'GCC') }}
      run:   |
             sudo apt update
             sudo apt install ninja-build ccache ${{ matrix.compiler.pkgs }}
      shell: bash

    - uses: astral-sh/setup-uv@v5

    - name: Install conan
      shell: bash
      run: uv pip install --system conan

    - name: Configure via CMake
      # Use a bash shell so we can use the same syntax for environment variable
      # access regardless of the host operating system
      shell: bash
      run: cmake --preset ${{ matrix.compiler.preset }}-${{ matrix.buildtype }}

    - name: Build
      shell: bash
      # Execute the build.  You can specify a specific target with "--target <NAME>"
      run:  cmake --build --preset ${{ matrix.compiler.preset }}-${{ matrix.buildtype }}

    - name: Test
      shell: bash
      run: ctest --preset ${{ matrix.compiler.preset }}-${{ matrix.buildtype }}

  windows:
    name: ${{ matrix.os }}, ${{ matrix.buildtype }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false  # 'false' means Don't stop matrix workflows even if some matrix entry fails.
      matrix:
        os: [windows-2022]
        buildtype: [release]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install conan
        shell: bash
        run: uv pip install --system conan jsonschema virtualenv ninja

      - name: Configure CMake
        # Use a bash shell so we can use the same syntax for environment variable
        shell: bash
        run: cmake --preset ${{ matrix.os }}-${{ matrix.buildtype }}

      - name: Build
        shell: bash
        run:  cmake --build --preset ${{ matrix.os }}-${{ matrix.buildtype }}

      - name: Test
        shell: bash
        run: ctest --preset ${{ matrix.os }}-${{ matrix.buildtype }}

  windows-mingw:
    name: ${{ matrix.os }}, MinGW ${{ matrix.buildtype }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false  # 'false' means Don't stop matrix workflows even if some matrix entry fails.
      matrix:
        os: [windows-2022]
        buildtype: [debug]
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: make
      - name: Install conan
        run: |
          pacman --noconfirm -Syu
          pacman --noconfirm -S mingw-w64-x86_64-ninja mingw-w64-x86_64-gcc mingw-w64-x86_64-cmake mingw-w64-x86_64-python mingw-w64-x86_64-uv
          uv pip install --system conan jsonschema virtualenv ninja

      - name: Configure CMake
        run: cmake --preset win32-gcc-x64-mingw-${{ matrix.buildtype }}

      - name: Build
        run:  cmake --build --preset win32-gcc-x64-mingw-${{ matrix.buildtype }}

      - name: Test
        run: ctest --preset win32-gcc-x64-mingw-${{ matrix.buildtype }}

  linux-static_analysis:
    name: Static Analysis, ${{ matrix.os }}, ${{ matrix.compiler.name }}, ${{ matrix.buildtype }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false  # 'false' means Don't stop matrix workflows even if some matrix entry fails.
      matrix:
        os: [ubuntu-24.04]
        buildtype: [debug]
        compiler: [{name: 'Clang 18', preset: clang-18, pkgs: 'clang-18 llvm-18 llvm-18-dev libclang-18-dev', iwyu_branch: 'clang_18', path_prefix: "/usr/lib/llvm-18"}]

    steps:
    - uses: actions/checkout@v4

    - name: Cache
      uses: actions/cache@v4
      env:
        cache-name: cache-conan-modules
      with:
        path: |
          ${{ env.CONAN_USER_HOME }}
          ~/.cache/pip
        key: ${{ runner.os }}-${{ env.BUILD_TYPE }}-${{ hashFiles('CMakeLists.txt') }}-${{ hashFiles('cmake/Conan.cmake') }}

    - uses: astral-sh/setup-uv@v5

    - name: Install conan
      shell: bash
      run: uv pip install --system conan

    - name: Install dependencies
      run:   |
             sudo apt update
             sudo apt install ninja-build ccache ${{ matrix.compiler.pkgs }} cppcheck
      shell: bash

    - name: Compile and install IWYU
      run:   |
             mkdir iwyu && cd iwyu
             git clone https://github.com/include-what-you-use/include-what-you-use.git
             cd include-what-you-use
             git checkout ${{ matrix.compiler.iwyu_branch }}
             cd ..
             mkdir build && cd build
             cmake -G "Ninja" -DCMAKE_PREFIX_PATH=${{ matrix.compiler.path_prefix }} ../include-what-you-use
             ninja
             sudo ninja install
      shell: bash

    - name: Configure via CMake
      shell: bash
      run: cmake --preset ${{ matrix.compiler.preset }}-${{ matrix.buildtype }}-static-analysis

    - name: Build
      shell: bash
      run:  cmake --build --preset ${{ matrix.compiler.preset }}-${{ matrix.buildtype }}-static-analysis

  linux-cross-compiling-armv7:
    name: ARM GCC, ${{ matrix.os }}, ${{ matrix.buildtype }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false  # 'false' means Don't stop matrix workflows even if some matrix entry fails.
      matrix:
        os: [ubuntu-24.04]
        buildtype: [debug, release]

    steps:
    - uses: actions/checkout@v4

    - name: Cache
      uses: actions/cache@v4
      env:
        cache-name: cache-conan-modules
      with:
        path: |
          ${{ env.CONAN_USER_HOME }}
          ~/.cache/pip
        key: ${{ runner.os }}-${{ env.BUILD_TYPE }}-${{ hashFiles('CMakeLists.txt') }}-${{ hashFiles('cmake/Conan.cmake') }}

    - uses: astral-sh/setup-uv@v5

    - name: Install conan
      shell: bash
      run: uv pip install --system conan

    - name: Install dependencies
      run:   |
             sudo apt update
             sudo apt install ninja-build wget ccache
      shell: bash

    - name: Install GCC ARM
      run:   |
             wget -O archive.tar.xz "https://developer.arm.com/-/media/Files/downloads/gnu/15.2.rel1/binrel/arm-gnu-toolchain-15.2.rel1-x86_64-arm-none-eabi.tar.xz" && \
             echo 597893282ac8c6ab1a4073977f2362990184599643b4c5ee34870a8215783a16 archive.tar.xz > /tmp/archive.sha256 && sha256sum -c /tmp/archive.sha256 && rm /tmp/archive.sha256 && \
             tar xf archive.tar.xz -C /opt
      shell: bash

    - name: Configure via CMake
      shell: bash
      run: cmake --preset gcc-arm-${{ matrix.buildtype }}

    - name: Build
      shell: bash
      run:  cmake --build --preset gcc-arm-${{ matrix.buildtype }}
