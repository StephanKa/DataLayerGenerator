name: Documentation

on:
  push:
    branches: [main]
  # Allow triggering manually from the Actions tab
  workflow_dispatch:

# Grant the workflow the permissions required by the GitHub Pages deployment API
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment runs at a time; cancel any in-progress run when a new
# push arrives so the latest commit is always what gets published.
concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-docs:
    name: Build Sphinx documentation
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      # ── Python + Sphinx + Breathe ──────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python doc dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            sphinx \
            sphinx-rtd-theme \
            breathe \
            sphinx-copybutton \
            jinja2 \
            jsonschema \
            pyyaml

      # ── Doxygen ───────────────────────────────────────────────────────────
      - name: Install Doxygen
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz

      # Configure the Doxyfile by substituting the @...@ placeholders directly
      # (avoids needing CMake + compiler toolchain just for docs)
      - name: Configure Doxyfile
        run: |
          mkdir -p build-docs/doxygen
          sed \
            -e 's|@DOXYGEN_INPUT_DIR@|'"$GITHUB_WORKSPACE"'/src/include|g' \
            -e 's|@DOXYGEN_OUTPUT_DIR@|'"$GITHUB_WORKSPACE"'/build-docs/doxygen|g' \
            docs/Doxyfile.in > build-docs/Doxyfile

      - name: Run Doxygen
        run: doxygen build-docs/Doxyfile

      # ── Sphinx ────────────────────────────────────────────────────────────
      - name: Run Sphinx
        run: |
          sphinx-build -b html \
            -Dbreathe_projects.DataLayerGenerator="$GITHUB_WORKSPACE/build-docs/doxygen/xml" \
            -Dhtml_theme=sphinx_rtd_theme \
            docs/ build-docs/sphinx

      # ── Upload to GitHub Pages ────────────────────────────────────────────
      # NOTE: GitHub Pages must be enabled once manually in the repository:
      #   Settings → Pages → Source → GitHub Actions
      - name: Upload HTML artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build-docs/sphinx

  deploy:
    name: Deploy to GitHub Pages
    needs: build-docs
    runs-on: ubuntu-24.04

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
